        function draw() {
          const canvas = document.getElementById("dashboardChart");
          if (!canvas) return;
          const wrapper = canvas.parentElement;
          const dpr = window.devicePixelRatio || 1;
          const cssW = wrapper.clientWidth - 32;
          const cssH = 420;
          canvas.width = cssW * dpr;
          canvas.height = cssH * dpr;
          canvas.style.width = cssW + "px";
          canvas.style.height = cssH + "px";
          const ctx = canvas.getContext("2d");
          ctx.scale(dpr, dpr);

          const pL = 48,
            pR = 12,
            pT = 28,
            pB = 52;
          const cW = cssW - pL - pR;
          const cH = cssH - pT - pB;
          const N = STAGES.length;
          const sw = cW / (N - 1); // stage spacing

          function xy(si, count) {
            return [pL + si * sw, pT + cH - (count / MAX_Y) * cH];
          }

          // Grid lines
          ctx.lineWidth = 1;
          for (let v = 0; v <= MAX_Y; v += GRID_STEP) {
            const y = pT + cH - (v / MAX_Y) * cH;
            ctx.strokeStyle = v === 0 ? "rgba(0,0,0,0.15)" : "rgba(0,0,0,0.05)";
            ctx.beginPath();
            ctx.moveTo(pL, y);
            ctx.lineTo(pL + cW, y);
            ctx.stroke();
          }

          // Vertical stage dividers
          ctx.strokeStyle = "rgba(0,0,0,0.04)";
          for (let i = 0; i < N; i++) {
            const x = pL + i * sw;
            ctx.beginPath();
            ctx.moveTo(x, pT);
            ctx.lineTo(x, pT + cH);
            ctx.stroke();
          }

          // Y-axis labels
          ctx.fillStyle = "#999";
          ctx.font = `10px "Work Sans", sans-serif`;
          ctx.textAlign = "right";
          for (let v = 0; v <= MAX_Y; v += GRID_STEP) {
            const y = pT + cH - (v / MAX_Y) * cH;
            ctx.fillText(v, pL - 6, y + 4);
          }

          // Y-axis title
          ctx.save();
          ctx.translate(11, pT + cH / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.textAlign = "center";
          ctx.font = `9px "Work Sans", sans-serif`;
          ctx.fillStyle = "#aaa";
          ctx.fillText("No. of Offenses", 0, 0);
          ctx.restore();

          // Stage labels top (Stage N)
          ctx.textAlign = "center";
          ctx.font = `9px "Work Sans", sans-serif`;
          ctx.fillStyle = "#bbb";
          for (let i = 0; i < N; i++) {
            ctx.fillText("Stage " + (i + 1), pL + i * sw, pT - 10);
          }

          // Stage names bottom
          ctx.fillStyle = "#888";
          ctx.font = `8px "Work Sans", sans-serif`;
          for (let i = 0; i < N; i++) {
            const x = pL + i * sw;
            const lines = STAGES[i].split("\n");
            lines.forEach((line, li) => {
              ctx.fillText(line, x, pT + cH + 14 + li * 12);
            });
          }

          // Draw flow paths (back to front by z-order)
          FLOWS.forEach((flow) => {
            const pts = flow.pts.map(([s, c]) => xy(s, c));

            // Curve
            ctx.strokeStyle = flow.color + "bb";
            ctx.lineWidth = flow.w;
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < pts.length; i++) {
              const [x0, y0] = pts[i - 1];
              const [x1, y1] = pts[i];
              const mx = (x0 + x1) / 2;
              ctx.bezierCurveTo(mx, y0, mx, y1, x1, y1);
            }
            ctx.stroke();

            // Dots
            pts.forEach(([x, y], i) => {
              const r = i === 0 || i === pts.length - 1 ? 5 : 3.5;
              // Halo
              ctx.beginPath();
              ctx.arc(x, y, r + 4, 0, Math.PI * 2);
              ctx.fillStyle = flow.color + "28";
              ctx.fill();
              // Dot
              ctx.beginPath();
              ctx.arc(x, y, r, 0, Math.PI * 2);
              ctx.fillStyle = flow.color;
              ctx.fill();
              // White inner
              ctx.beginPath();
              ctx.arc(x, y, r - 1.5, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(255,255,255,0.4)";
              ctx.fill();
            });
          });
        }

        document.addEventListener("DOMContentLoaded", draw);
        window.addEventListener("resize", draw);
